<main class="bg-[#f8fbf4] text-[#23301b]">
	<section class="mx-auto grid min-h-[70vh] max-w-6xl gap-8 px-5 py-16 md:px-8 lg:grid-cols-[minmax(0,1fr)_minmax(18rem,0.8fr)] lg:items-center">
		<div>
			<p class="text-sm font-bold uppercase tracking-[0.18em] text-[#5f7f35]">404</p>
			<h1 class="mt-3 text-4xl font-bold leading-tight text-[#1f3218] md:text-5xl">
				Сторінку не знайдено
			</h1>
			<p class="mt-5 max-w-2xl text-lg leading-8 text-[#4e5c45]">
				Можливо, сторінку було переміщено, видалено або посилання містить помилку. Але ви все ще можете продовжити подорож світом дикої природи.
			</p>
			<div class="mt-8 flex flex-wrap gap-3">
				<a class="rounded-md bg-[#5f7f35] px-5 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-[#4c692b]" routerLink="/">
					На головну
				</a>
				<a class="rounded-md border border-[#5f7f35] px-5 py-3 text-sm font-semibold text-[#3d5f20] transition hover:bg-white" routerLink="/tvaryny">
					Переглянути тварин
				</a>
			</div>
		</div>

		<img
			class="aspect-square w-full rounded-lg object-contain"
			[ngSrc]="notFoundImage"
			width="720"
			height="720"
			alt=""
			priority
		/>
	</section>

	<section class="mx-auto max-w-6xl px-5 pb-16 md:px-8">
		<h2 class="text-2xl font-bold text-[#1f3218]">Куди перейти далі?</h2>
		<div class="mt-5 grid gap-3 sm:grid-cols-2 lg:grid-cols-5">
			@for (link of quickLinks; track link.path) {
				<a class="rounded-md border border-[#d9e5ca] bg-white px-4 py-3 text-sm font-semibold text-[#3d5f20] transition hover:border-[#5f7f35]" [routerLink]="link.path">
					{{ link.label }}
				</a>
			}
		</div>
	</section>
</main>
