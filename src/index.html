    <script>
      try {
        const storedMode = localStorage.getItem('app-mode');
        const preferredMode = storedMode === 'dark' || storedMode === 'light' ? storedMode : 'light';
        if (!storedMode) {
          localStorage.setItem('app-mode', 'light');
        }
        document.documentElement.setAttribute('data-mode', preferredMode);
      } catch {}
    </script>
