<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <title>Park Arden</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      try {
        const storedMode = localStorage.getItem('app-mode');
        const preferredMode =
          storedMode === 'dark' || storedMode === 'light'
            ? storedMode
            : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
        document.documentElement.setAttribute('data-mode', preferredMode);
      } catch {}
    </script>

    <meta
      name="description"
      content="Парк диких тварин “АРДЕН” - сучасний інформаційний сайт з бронюванням візитів і можливістю підтримати парк донатом."
    />
    <meta name="author" content="Парк диких тварин “АРДЕН”" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#f7f8ef" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1f3a27" media="(prefers-color-scheme: dark)" />

    <meta itemprop="name" content="Park Arden" />
    <meta
      itemprop="description"
      content="Парк диких тварин “АРДЕН” - теплий сімейний простір природи, бронювання візитів і підтримка парку."
    />
    <meta itemprop="image" content="https://parkarden.itkamianets.com/logo.png" />
